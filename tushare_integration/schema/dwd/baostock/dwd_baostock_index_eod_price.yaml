id: 3103
name: dwd_baostock_index_eod_price
comment: Baostock指数日线行情标准层
builder: mapped_versioned
source:
  table_name: baostock_index_daily_raw
  schema_name: baostock/index_daily
source_filters:
  - "src.`date` >= toDate32('2015-01-01')"
instrument_type: index
instrument_id_expr: "concat('index:', concat(arrayElement(splitByChar('.', assumeNotNull(src.code)), 2), '.', multiIf(lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sh', 'SH', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sz', 'SZ', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'bj', 'BJ', upper(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)))))"
source_code_expr: "concat(arrayElement(splitByChar('.', assumeNotNull(src.code)), 2), '.', multiIf(lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sh', 'SH', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sz', 'SZ', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'bj', 'BJ', upper(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1))))"
exchange_expr: "multiIf(lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sh', 'SH', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sz', 'SZ', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'bj', 'BJ', upper(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)))"
event_date_expr: src.date
calendar_date_expr: src.date
available_trade_date_expr: coalesce(calendar_map.next_trade_date, src.date)
business_key:
  - ts_code
  - trade_date
partition_key:
  - toYear(available_trade_date)
indexes:
  - name: dwd_baostock_index_eod_price_idx
    columns:
      - instrument_id
      - event_date
      - sys_from
columns:
  - name: ts_code
    data_type: str
    length: 16
    comment: 标准指数代码
    expr: "concat(arrayElement(splitByChar('.', assumeNotNull(src.code)), 2), '.', multiIf(lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sh', 'SH', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sz', 'SZ', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'bj', 'BJ', upper(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1))))"
  - name: trade_date
    data_type: date
    comment: 交易日期
    expr: src.date
  - name: close
    data_type: float
    nullable: true
    comment: 收盘价
    expr: src.close
  - name: open
    data_type: float
    nullable: true
    comment: 开盘价
    expr: src.open
  - name: high
    data_type: float
    nullable: true
    comment: 最高价
    expr: src.high
  - name: low
    data_type: float
    nullable: true
    comment: 最低价
    expr: src.low
  - name: pre_close
    data_type: float
    nullable: true
    comment: 昨收价
    expr: src.preclose
  - name: change
    data_type: float
    nullable: true
    comment: 涨跌额
    expr: "src.close - src.preclose"
  - name: pct_chg
    data_type: float
    nullable: true
    comment: 涨跌幅
    expr: src.pctChg
  - name: vol
    data_type: float
    nullable: true
    comment: 成交量
    expr: src.volume
  - name: amount
    data_type: float
    nullable: true
    comment: 成交额
    expr: src.amount
