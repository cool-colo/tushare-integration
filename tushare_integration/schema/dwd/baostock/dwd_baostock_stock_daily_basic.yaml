id: 3102
name: dwd_baostock_stock_daily_basic
comment: Baostock股票每日指标标准层
builder: mapped_versioned
source:
  table_name: baostock_stock_daily_raw
  schema_name: baostock/stock_daily
source_filters:
  - "src.`date` >= toDate32('2015-01-01')"
  - "src.`adjustflag` = '3'"
instrument_type: stock
instrument_id_expr: "concat('stock:', concat(arrayElement(splitByChar('.', assumeNotNull(src.code)), 2), '.', multiIf(lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sh', 'SH', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sz', 'SZ', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'bj', 'BJ', upper(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)))))"
source_code_expr: "concat(arrayElement(splitByChar('.', assumeNotNull(src.code)), 2), '.', multiIf(lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sh', 'SH', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sz', 'SZ', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'bj', 'BJ', upper(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1))))"
exchange_expr: "multiIf(lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sh', 'SH', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sz', 'SZ', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'bj', 'BJ', upper(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)))"
event_date_expr: src.date
calendar_date_expr: src.date
available_trade_date_expr: coalesce(calendar_map.next_trade_date, src.date)
business_key:
  - ts_code
  - trade_date
partition_key:
  - toYear(available_trade_date)
indexes:
  - name: dwd_baostock_stock_daily_basic_idx
    columns:
      - instrument_id
      - event_date
      - sys_from
columns:
  - name: ts_code
    data_type: str
    length: 16
    comment: 标准股票代码
    expr: "concat(arrayElement(splitByChar('.', assumeNotNull(src.code)), 2), '.', multiIf(lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sh', 'SH', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'sz', 'SZ', lower(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1)) = 'bj', 'BJ', upper(arrayElement(splitByChar('.', assumeNotNull(src.code)), 1))))"
  - name: trade_date
    data_type: date
    comment: 交易日期
    expr: src.date
  - name: close
    data_type: number
    nullable: true
    comment: 收盘价
    expr: src.close
  - name: turnover_rate
    data_type: number
    nullable: true
    comment: 换手率
    expr: src.turn
  - name: turnover_rate_f
    data_type: number
    nullable: true
    comment: 自由流通换手率
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: volume_ratio
    data_type: number
    nullable: true
    comment: 量比
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: pe
    data_type: number
    nullable: true
    comment: 市盈率
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: pe_ttm
    data_type: number
    nullable: true
    comment: 市盈率TTM
    expr: src.peTTM
  - name: pb
    data_type: number
    nullable: true
    comment: 市净率
    expr: src.pbMRQ
  - name: ps
    data_type: number
    nullable: true
    comment: 市销率
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: ps_ttm
    data_type: number
    nullable: true
    comment: 市销率TTM
    expr: src.psTTM
  - name: dv_ratio
    data_type: number
    nullable: true
    comment: 股息率
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: dv_ttm
    data_type: number
    nullable: true
    comment: 股息率TTM
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: total_share
    data_type: number
    nullable: true
    comment: 总股本
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: float_share
    data_type: number
    nullable: true
    comment: 流通股本
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: free_share
    data_type: number
    nullable: true
    comment: 自由流通股本
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: total_mv
    data_type: number
    nullable: true
    comment: 总市值
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: circ_mv
    data_type: number
    nullable: true
    comment: 流通市值
    expr: CAST(NULL, 'Nullable(Float64)')
  - name: pcf_ncf_ttm
    data_type: number
    nullable: true
    comment: Baostock市现率TTM
    expr: src.pcfNcfTTM
  - name: trade_status
    data_type: str
    length: 16
    nullable: true
    comment: Baostock交易状态
    expr: src.tradestatus
  - name: is_st
    data_type: str
    length: 16
    nullable: true
    comment: Baostock ST标记
    expr: src.isST
