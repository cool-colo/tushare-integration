id: 3011
api_name: query_growth_data
name: baostock_stock_growth
comment: Baostock季度成长能力指标
dependencies:
  - baostock/stock/basic
primary_key:
  - code
  - pubDate
  - statDate
indexes: []
columns:
  - name: code
    data_type: str
    length: 16
    default: ""
    comment: Baostock股票代码
  - name: pubDate
    data_type: date
    default: "1970-01-01"
    comment: 发布日期
  - name: statDate
    data_type: date
    default: "1970-01-01"
    comment: 报告期
  - name: YOYEquity
    data_type: float
    default: "0.0"
    comment: 净资产同比增长率
  - name: YOYAsset
    data_type: float
    default: "0.0"
    comment: 总资产同比增长率
  - name: YOYNI
    data_type: float
    default: "0.0"
    comment: 净利润同比增长率
  - name: YOYEPSBasic
    data_type: float
    default: "0.0"
    comment: 基本每股收益同比增长率
  - name: YOYPNI
    data_type: float
    default: "0.0"
    comment: 归母净利润同比增长率
