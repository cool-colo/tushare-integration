id: 3010
api_name: query_operation_data
name: baostock_stock_operation
comment: Baostock季度营运能力指标
dependencies:
  - baostock/stock/basic
primary_key:
  - code
  - pubDate
  - statDate
indexes: []
columns:
  - name: code
    data_type: str
    length: 16
    default: ""
    comment: Baostock股票代码
  - name: pubDate
    data_type: date
    default: "1970-01-01"
    comment: 发布日期
  - name: statDate
    data_type: date
    default: "1970-01-01"
    comment: 报告期
  - name: NRTurnRatio
    data_type: float
    default: "0.0"
    comment: 应收账款周转率
  - name: NRTurnDays
    data_type: float
    default: "0.0"
    comment: 应收账款周转天数
  - name: INVTurnRatio
    data_type: float
    default: "0.0"
    comment: 存货周转率
  - name: INVTurnDays
    data_type: float
    default: "0.0"
    comment: 存货周转天数
  - name: CATurnRatio
    data_type: float
    default: "0.0"
    comment: 流动资产周转率
  - name: AssetTurnRatio
    data_type: float
    default: "0.0"
    comment: 总资产周转率
