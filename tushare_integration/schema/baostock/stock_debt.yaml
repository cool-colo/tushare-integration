id: 3012
api_name: query_debtpaying_data
name: baostock_stock_debt
comment: Baostock季度偿债能力指标
dependencies:
  - baostock/stock/basic
primary_key:
  - code
  - pubDate
  - statDate
indexes: []
columns:
  - name: code
    data_type: str
    length: 16
    default: ""
    comment: Baostock股票代码
  - name: pubDate
    data_type: date
    default: "1970-01-01"
    comment: 发布日期
  - name: statDate
    data_type: date
    default: "1970-01-01"
    comment: 报告期
  - name: currentRatio
    data_type: float
    default: "0.0"
    comment: 流动比率
  - name: quickRatio
    data_type: float
    default: "0.0"
    comment: 速动比率
  - name: cashRatio
    data_type: float
    default: "0.0"
    comment: 现金比率
  - name: YOYLiability
    data_type: float
    default: "0.0"
    comment: 总负债同比增长率
  - name: liabilityToAsset
    data_type: float
    default: "0.0"
    comment: 资产负债率
  - name: assetToEquity
    data_type: float
    default: "0.0"
    comment: 权益乘数
