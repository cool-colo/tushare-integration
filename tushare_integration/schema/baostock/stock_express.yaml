id: 3009
api_name: query_performance_express_report
name: baostock_stock_express
comment: Baostock业绩快报
dependencies:
  - baostock/stock/basic
primary_key:
  - code
  - pubDate
  - statDate
indexes: []
columns:
  - name: code
    data_type: str
    length: 16
    default: ""
    comment: Baostock股票代码
  - name: pubDate
    data_type: date
    default: "1970-01-01"
    comment: 发布日期
  - name: statDate
    data_type: date
    default: "1970-01-01"
    comment: 报告期
  - name: revenue
    data_type: float
    default: "0.0"
    comment: 营业收入
  - name: operateProfit
    data_type: float
    default: "0.0"
    comment: 营业利润
  - name: totalProfit
    data_type: float
    default: "0.0"
    comment: 利润总额
  - name: netProfit
    data_type: float
    default: "0.0"
    comment: 净利润
  - name: totalAssets
    data_type: float
    default: "0.0"
    comment: 总资产
  - name: shareholdersEquity
    data_type: float
    default: "0.0"
    comment: 股东权益
  - name: EPS
    data_type: float
    default: "0.0"
    comment: 每股收益
  - name: ROE
    data_type: float
    default: "0.0"
    comment: 净资产收益率
  - name: yoyNetProfit
    data_type: float
    default: "0.0"
    comment: 净利润同比增长率
