id: 3008
api_name: baostock_financial_indicator
name: baostock_stock_financial_indicator
comment: Baostock季度财务指标合并表
dependencies:
  - baostock/stock/basic
primary_key:
  - code
  - statDate
indexes: []
columns:
  - name: code
    data_type: str
    length: 16
    default: ""
    comment: Baostock股票代码
  - name: pubDate
    data_type: date
    default: "1970-01-01"
    comment: 发布日期
  - name: statDate
    data_type: date
    default: "1970-01-01"
    comment: 报告期
  - name: roeAvg
    data_type: float
    default: "0.0"
    comment: 平均净资产收益率
  - name: npMargin
    data_type: float
    default: "0.0"
    comment: 销售净利率
  - name: gpMargin
    data_type: float
    default: "0.0"
    comment: 销售毛利率
  - name: epsTTM
    data_type: float
    default: "0.0"
    comment: 每股收益TTM
  - name: MBRevenue
    data_type: float
    default: "0.0"
    comment: 主营业务收入
  - name: NRTurnRatio
    data_type: float
    default: "0.0"
    comment: 应收账款周转率
  - name: INVTurnRatio
    data_type: float
    default: "0.0"
    comment: 存货周转率
  - name: CATurnRatio
    data_type: float
    default: "0.0"
    comment: 流动资产周转率
  - name: AssetTurnRatio
    data_type: float
    default: "0.0"
    comment: 总资产周转率
  - name: YOYEquity
    data_type: float
    default: "0.0"
    comment: 净资产同比增长率
  - name: YOYAsset
    data_type: float
    default: "0.0"
    comment: 总资产同比增长率
  - name: YOYNI
    data_type: float
    default: "0.0"
    comment: 净利润同比增长率
  - name: YOYEPSBasic
    data_type: float
    default: "0.0"
    comment: 基本每股收益同比增长率
  - name: YOYPNI
    data_type: float
    default: "0.0"
    comment: 归母净利润同比增长率
  - name: currentRatio
    data_type: float
    default: "0.0"
    comment: 流动比率
  - name: quickRatio
    data_type: float
    default: "0.0"
    comment: 速动比率
  - name: cashRatio
    data_type: float
    default: "0.0"
    comment: 现金比率
  - name: liabilityToAsset
    data_type: float
    default: "0.0"
    comment: 资产负债率
  - name: assetToEquity
    data_type: float
    default: "0.0"
    comment: 权益乘数
  - name: CAToAsset
    data_type: float
    default: "0.0"
    comment: 流动资产除以总资产
  - name: tangibleAssetToAsset
    data_type: float
    default: "0.0"
    comment: 有形资产除以总资产
  - name: ebitToInterest
    data_type: float
    default: "0.0"
    comment: 已获利息倍数
  - name: CFOToOR
    data_type: float
    default: "0.0"
    comment: 经营现金净流量除以营业收入
  - name: CFOToNP
    data_type: float
    default: "0.0"
    comment: 经营现金净流量除以净利润
  - name: CFOToGr
    data_type: float
    default: "0.0"
    comment: 经营现金净流量除以营业总收入
  - name: dupontROE
    data_type: float
    default: "0.0"
    comment: 杜邦ROE
  - name: dupontAssetStoEquity
    data_type: float
    default: "0.0"
    comment: 杜邦权益乘数
  - name: dupontAssetTurn
    data_type: float
    default: "0.0"
    comment: 杜邦总资产周转率
